<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II Live</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0b0f1a, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.container {
  position: relative;
  height: 100vh;
  width: 100%;
}

/* estrellas */
.stars {
  position: absolute;
  width: 200%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.25;
}

.layer1 { animation: moveStars 60s linear infinite; }
.layer2 { animation: moveStars 120s linear infinite; opacity: 0.4; }

@keyframes moveStars {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* planetas */
.earth, .moon {
  position: absolute;
  bottom: 15%;
  width: 8vw;
  height: 8vw;
  min-width: 40px;
  min-height: 40px;
  max-width: 80px;
  max-height: 80px;
  border-radius: 50%;
}

.earth {
  left: 5%;
  background: radial-gradient(circle, #3fa9f5, #1b4d89);
  box-shadow: 0 0 25px #3fa9f5;
}

.moon {
  right: 5%;
  background: radial-gradient(circle, #ccc, #888);
  box-shadow: 0 0 15px #aaa;
}

/* trayectoria */
.path {
  position: absolute;
  bottom: calc(15% + 4vw);
  left: 10%;
  right: 10%;
  height: 2px;
  background: rgba(255,255,255,0.2);
}

/* COHETE (FIX IMPORTANTE) */
.rocket {
  position: absolute;
  bottom: calc(15% + 4vw);
  left: 10%;
  transform: translate(-50%, 50%);
  transition: left 1s linear;
}

/* tamaño responsive */
.rocket-wrapper {
  width: 6vw;
  max-width: 40px;
  min-width: 25px;
}

/* svg */
.rocket-svg {
  width: 100%;
  filter: drop-shadow(0 0 10px white);
}

/* fuego */
.flame {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
}

.flame-inner {
  width: 6px;
  height: 20px;
  background: radial-gradient(circle, #fff, #ff9800);
  border-radius: 50%;
  filter: blur(3px);
  animation: flameInner 0.08s infinite alternate;
}

.flame-outer {
  position: absolute;
  top: 5px;
  left: -5px;
  width: 16px;
  height: 30px;
  background: radial-gradient(circle, orange, red, transparent);
  border-radius: 50%;
  filter: blur(8px);
  opacity: 0.7;
  animation: flameOuter 0.12s infinite alternate;
}

@keyframes flameInner {
  from { transform: scaleY(1); }
  to { transform: scaleY(1.6); }
}

@keyframes flameOuter {
  from { transform: scaleY(1); opacity: 0.6; }
  to { transform: scaleY(1.8); opacity: 0.3; }
}

/* info */
.info {
  position: absolute;
  bottom: 5%;
  width: 100%;
  text-align: center;
}

#distance {
  font-size: clamp(24px, 5vw, 40px);
  font-weight: bold;
}

#percent, #time, #speed {
  opacity: 0.7;
  margin-top: 5px;
  font-size: clamp(12px, 3vw, 16px);
}

/* mobile ajustes */
@media (max-width: 600px) {
  .earth, .moon {
    bottom: 18%;
  }

  .path {
    bottom: calc(18% + 20px);
  }

  .rocket {
    bottom: calc(18% + 20px);
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="stars layer1"></div>
  <div class="stars layer2"></div>

  <div class="earth"></div>
  <div class="moon"></div>
  <div class="path"></div>

  <!-- 🚀 COHETE -->
  <div id="rocket" class="rocket">
    <div class="rocket-wrapper">

      <svg class="rocket-svg" viewBox="0 0 40 100">
        <rect x="10" y="20" width="20" height="60" rx="10" fill="url(#metal)" />
        <polygon points="20,0 30,20 10,20" fill="#ddd"/>
        <circle cx="20" cy="40" r="5" fill="#4fc3f7"/>
        <polygon points="10,70 0,90 10,85" fill="#999"/>
        <polygon points="30,70 40,90 30,85" fill="#999"/>

        <defs>
          <linearGradient id="metal" x1="0" x2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="50%" stop-color="#bbbbbb"/>
            <stop offset="100%" stop-color="#eeeeee"/>
          </linearGradient>
        </defs>
      </svg>

      <div class="flame">
        <div class="flame-inner"></div>
        <div class="flame-outer"></div>
      </div>

    </div>
  </div>

  <!-- info -->
  <div class="info">
    <div id="distance">0 km</div>
    <div id="percent"></div>
    <div id="time"></div>
    <div id="speed"></div>
  </div>

</div>

<!-- sonido -->
<audio id="spaceSound" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4c9c.mp3" type="audio/mpeg">
</audio>

<script>
const TOTAL_DISTANCE = 384400;
let startTime = Date.now();
let current = 0;

document.body.addEventListener("click", () => {
  document.getElementById("spaceSound").play();
}, { once: true });

let last = 0;
let lastTime = Date.now();

function updateSpeed(distance) {
  const now = Date.now();
  const speed = (distance - last) / ((now - lastTime)/1000);

  document.getElementById("speed").innerText =
    "Velocidad: " + Math.floor(speed) + " km/s";

  last = distance;
  lastTime = now;
}

function animateRocket(progress) {
  const start = window.innerWidth * 0.1;
  const end = window.innerWidth * 0.9;
  const pos = start + (end - start) * progress;
  document.getElementById("rocket").style.left = pos + "px";
}

function update() {
  current += Math.random() * 4000;

  document.getElementById("distance").innerText =
    Math.floor(current).toLocaleString() + " km";

  const progress = Math.min(current / TOTAL_DISTANCE, 1);

  document.getElementById("percent").innerText =
    "Progreso: " + Math.floor(progress * 100) + "%";

  const elapsed = (Date.now() - startTime) / 1000;
  document.getElementById("time").innerText =
    "Tiempo misión: " + Math.floor(elapsed) + " s";

  updateSpeed(current);
  animateRocket(progress);
}

setInterval(update, 2000);
update();
</script>

</body>
</html>

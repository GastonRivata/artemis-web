<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASA - Artemis II Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ffb400;
            --nasa-blue: #0b3d91;
            --warning: #ff3333;
            --terminal-bg: rgba(7, 7, 10, 0.95);
            --border: rgba(255, 180, 0, 0.2);
            --font-mono: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; background: #000; color: #e0e0e0;
            font-family: var(--font-mono);
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        .scanlines {
            position: fixed; inset: 0; z-index: 1000; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
        }

        .viewport { position: relative; flex: 1; overflow: hidden; z-index: 1; }
        
        #bg-video {
            position: absolute; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover; 
            z-index: -2;
        }

        .overlay-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .mission-header {
            position: absolute; top: 20px; left: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 10px;
        }
        .mission-header .box {
            border: 1px solid var(--border);
            padding: 8px 15px; background: var(--terminal-bg);
            backdrop-filter: blur(5px); display: inline-block;
            box-shadow: 0 0 15px rgba(255, 180, 0, 0.1);
        }
        .mission-header h1 { 
            margin: 0; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; 
            letter-spacing: 5px; color: #fff;
            text-shadow: 0 0 10px var(--accent);
        }

        .path-monitor {
            position: absolute; top: 20px; right: 20px; width: 180px;
            border: 1px solid var(--border); background: var(--terminal-bg);
            backdrop-filter: blur(10px); z-index: 50;
        }
        .path-monitor video { width: 100%; height: auto; opacity: 0.8; display: block; }
        .monitor-label { font-size: 0.5rem; color: var(--accent); padding: 4px; text-align: center; border-bottom: 1px solid var(--border); }

        .hud-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%;
            z-index: 110; transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .hud-wrapper.active { transform: translateY(0); }

        #hud-toggle {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            background: var(--terminal-bg); border: 1px solid var(--accent);
            border-bottom: none; color: var(--accent); padding: 10px 20px; 
            cursor: pointer; font-family: var(--font-mono); font-size: 0.65rem; 
            letter-spacing: 2px; backdrop-filter: blur(20px);
        }

        .hud-main {
            background: var(--terminal-bg); border-top: 1px solid var(--accent);
            backdrop-filter: blur(20px); max-height: 50vh; overflow-y: auto;
        }

        .hud-content {
            display: grid; grid-template-columns: repeat(5, 1fr);
            min-width: 800px;
        }

        .hud-item {
            padding: 20px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: center;
        }
        .hud-item:last-child { border-right: none; }

        .hud-label { font-size: 0.5rem; color: var(--accent); opacity: 0.7; margin-bottom: 5px; }
        .hud-value { font-size: 0.8rem; color: #fff; font-weight: 700; white-space: nowrap; }
        .hud-sub { font-size: 0.6rem; color: #888; margin-top: 2px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .status-dot { width: 6px; height: 6px; background: var(--warning); border-radius: 50%; display: inline-block; margin-left: 5px; animation: pulse 1.5s infinite; }

        /* --- AJUSTES RESPONSIVE --- */
        @media (max-width: 768px) {
            .mission-header { top: 10px; left: 10px; }
            .mission-header h1 { font-size: 0.9rem; letter-spacing: 2px; }
            .mission-header .box { padding: 5px 10px; }

            .path-monitor { 
                width: 110px; 
                top: auto; 
                bottom: 50px; 
                right: 10px; 
            }
            
            .hud-content {
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
                min-width: 100%;
            }

            .hud-item {
                padding: 15px;
                border-right: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }
            
            .hud-item:nth-child(2n) { border-right: none; }
            .hud-value { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="viewport">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="img/Moon_Phases_Near_Far_Waning_720.mp4" type="video/mp4">
        </video>
        
        <div class="overlay-vignette"></div>

        <div class="mission-header">
            <div class="box">
                <h1>ARTEMIS II <span class="status-dot"></span></h1>
            </div>
            <div class="box">
                <span style="font-size: 0.5rem; letter-spacing: 1px;">S/C STATUS: <span style="color: #00ff00;">NOMINAL</span></span>
            </div>
        </div>

        <div class="path-monitor">
            <div class="monitor-label">TRAYECT_FEED</div>
            <video autoplay muted loop playsinline>
                <source src="img/path.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="hud-wrapper" id="hud-wrap">
        <button id="hud-toggle" onclick="toggleHUD()">DATA_TERMINAL</button>
        
        <footer class="hud-main">
            <div class="hud-content">
                <div class="hud-item">
                    <span class="hud-label">ORION TELEMETRY</span>
                    <span class="hud-value" id="mission-clock">UTC 00:00:00</span>
                    <span class="hud-sub" style="color: var(--warning);">MODE: ACTIVE</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">LUNAR PARAMS</span>
                    <span class="hud-value">G: <span id="moon-gravity">1.62</span></span>
                    <span class="hud-sub">RAD: <span id="moon-radius">1,737</span></span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">NASA_SOURCE</span>
                    <span id="nasa-title" class="hud-value" style="font-size: 0.65rem;">FETCHING...</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">ISS_COORDS</span>
                    <span class="hud-value" id="iss-pos">LAT: -- / LON: --</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">MISSION_LOG</span>
                    <span id="artemis-log" class="hud-value" style="font-size: 0.65rem; color: #00ff00;">STANDBY</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function toggleHUD() {
            const wrap = document.getElementById('hud-wrap');
            const btn = document.getElementById('hud-toggle');
            wrap.classList.toggle('active');
            btn.innerText = wrap.classList.contains('active') ? "CERRAR" : "DATA_TERMINAL";
        }

        async function getNasaData() {
            try {
                const res = await fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
                const data = await res.json();
                document.getElementById("nasa-title").innerText = data.title.toUpperCase().substring(0, 20) + "...";
            } catch (e) { }
        }

        async function getISS() {
            try {
                const res = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
                const data = await res.json();
                document.getElementById("iss-pos").innerText = `${data.latitude.toFixed(1)}°N ${data.longitude.toFixed(1)}°E`;
            } catch (err) { }
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById("mission-clock").innerText = "UTC " + now.toISOString().split('T')[1].split('.')[0];
        }, 1000);

        getNasaData();
        getISS();
        setInterval(getISS, 10000);
    </script>
</body>
</html>

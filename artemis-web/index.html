<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II Live</title>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

  <!-- fondo -->
  <div class="stars layer1"></div>
  <div class="stars layer2"></div>

  <!-- escena -->
  <div class="scene">

    <div class="earth"></div>
    <div class="moon"></div>

    <div class="track">
      <div class="path"></div>

      <!-- 🚀 COHETE -->
      <div id="rocket" class="rocket">
        <div class="rocket-wrapper">

          <svg viewBox="0 0 40 100">
            <rect x="10" y="20" width="20" height="60" rx="10" fill="url(#metal)" />
            <polygon points="20,0 30,20 10,20" fill="#ddd"/>
            <circle cx="20" cy="40" r="5" fill="#4fc3f7"/>
            <polygon points="10,70 0,90 10,85" fill="#999"/>
            <polygon points="30,70 40,90 30,85" fill="#999"/>

            <defs>
              <linearGradient id="metal" x1="0" x2="1">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#bbbbbb"/>
                <stop offset="100%" stop-color="#eeeeee"/>
              </linearGradient>
            </defs>
          </svg>

          <!-- 🔥 fuego -->
          <div class="flame">
            <div class="flame-inner"></div>
            <div class="flame-outer"></div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- info -->
  <div class="info">
    <div id="distance">0 km</div>
    <div id="percent"></div>
    <div id="time"></div>
    <div id="speed"></div>
  </div>

</div>

<audio id="spaceSound" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4c9c.mp3">
</audio>

<script>
const TOTAL_DISTANCE = 384400;
let startTime = Date.now();
let current = 0;

document.body.addEventListener("click", () => {
  document.getElementById("spaceSound").play();
}, { once: true });

let last = 0;
let lastTime = Date.now();

function updateSpeed(distance) {
  const now = Date.now();
  const speed = (distance - last) / ((now - lastTime)/1000);

  document.getElementById("speed").innerText =
    "Velocidad: " + Math.floor(speed) + " km/s";

  last = distance;
  lastTime = now;
}

function animateRocket(progress) {
  const track = document.querySelector(".track");
  const width = track.offsetWidth;

  const pos = progress * width;
  document.getElementById("rocket").style.left = pos + "px";
}

function update() {
  current += Math.random() * 4000;

  document.getElementById("distance").innerText =
    Math.floor(current).toLocaleString() + " km";

  const progress = Math.min(current / TOTAL_DISTANCE, 1);

  document.getElementById("percent").innerText =
    "Progreso: " + Math.floor(progress * 100) + "%";

  const elapsed = (Date.now() - startTime) / 1000;
  document.getElementById("time").innerText =
    "Tiempo misión: " + Math.floor(elapsed) + " s";

  updateSpeed(current);
  animateRocket(progress);
}

setInterval(update, 2000);
update();
</script>

</body>
</html>

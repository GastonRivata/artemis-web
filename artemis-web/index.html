<!DOCTYPE html>
<meta property="og:title" content="Artemis II en tiempo real">
<meta property="og:description" content="Mirá qué tan lejos está ahora">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FUNCIONA A</title>

    <style>
  body {
    margin: 0;
    background: radial-gradient(circle at center, #0b0f1a, #000);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
  }

  #distance {
    font-size: 100px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  #label {
    margin-top: 10px;
    opacity: 0.6;
    font-size: 18px;
  }

  #pulse {
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(0, 150, 255, 0.2);
    border-radius: 50%;
    filter: blur(80px);
    animation: pulse 3s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.3); opacity: 0.2; }
    100% { transform: scale(1); opacity: 0.5; }
  }
</style>
</head>

<body>
    <div id="distance">...</div>
    <div id="label">Distancia desde la Tierra</div>
     <div id="pulse"></div>
    
    <script>
        async function update() {
            try {
                const res = await fetch("https://TU-BACKEND/api/artemis/distance")
                const data = await res.json();

                let current = 0;

                function animate(target) {
                    const step = (target - current) * 0.2;
                    current += step;

                    document.getElementById("distance").innerText =
                        Math.floor(current).toLocaleString() + " km";
                }

                async function update() {
                    const res = await fetch("/api/artemis/distance");
                    const data = await res.json();

                    animate(data.distance);
                }

                setInterval(update, 2000);
            } catch (e) {
                document.getElementById("distance").innerText = "Error";
            }
        }

        setInterval(update, 2000);
        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASA - Artemis II Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ffb400;
            --nasa-blue: #0b3d91;
            --warning: #ff3333;
            --terminal-bg: rgba(7, 7, 10, 0.85);
            --border: rgba(255, 180, 0, 0.3);
            --font-mono: 'Roboto Mono', monospace;
            --font-orbitron: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            background: #000; color: #e0e0e0;
            font-family: var(--font-mono);
            overflow: hidden; height: 100%; width: 100%;
        }

        .scanlines {
            position: fixed; inset: 0; z-index: 1000; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; opacity: 0.5;
        }

        .viewport { 
            position: relative; height: 100dvh; width: 100%;
            overflow: hidden; z-index: 1; 
        }
        
        #bg-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: -2;
          
        }

        .overlay-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* --- MONITOR DE TRAYECTORIA INTEGRADO --- */
        .path-monitor {
            position: absolute; 
            top: 30px; 
            right: 30px; 
            width: 220px;
            z-index: 110;
            display: flex;
            flex-direction: column;
        }

        /* Contenedor del video con efectos de integración */
        .video-container {
            position: relative;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            /* Mezcla el video con el fondo (lo negro se vuelve transparente) */
            mix-blend-mode: screen; 
            /* Desvanece los bordes del video */
            -webkit-mask-image: radial-gradient(circle, black 60%, transparent 95%);
            mask-image: radial-gradient(circle, black 60%, transparent 95%);
        }

        .path-monitor video {
            width: 100%;
            height: auto;
            display: block;
            /* Tinte dorado para que combine con la UI */
            filter: sepia(1) saturate(5) hue-rotate(-10deg) brightness(1.2);
        }

        /* Decoración de las esquinas */
        .path-monitor::before, .path-monitor::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            border: 2px solid var(--accent);
            z-index: 120;
        }
        .path-monitor::before { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .path-monitor::after { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        .monitor-label { 
            font-size: 0.55rem; color: var(--accent); 
            padding: 5px 0; letter-spacing: 2px;
            text-transform: uppercase;
            display: flex; justify-content: space-between;
        }

        .monitor-coords {
            font-size: 0.45rem; color: var(--accent);
            opacity: 0.6; margin-top: 5px;
            font-family: var(--font-mono);
        }

        /* --- RESTO DE LA UI --- */
        .mission-header {
            position: absolute; top: 20px; left: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 8px;
        }

        .mission-header .box {
            border: 1px solid var(--border);
            padding: 10px 18px; background: var(--terminal-bg);
            backdrop-filter: blur(8px);
            border-left: 4px solid var(--accent);
        }

        .mission-header h1 { 
            margin: 0; font-family: var(--font-orbitron); 
            font-size: clamp(1rem, 4vw, 1.4rem); 
            letter-spacing: 3px; color: #fff;
            text-shadow: 0 0 10px var(--accent);
        }

        .hud-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%;
            z-index: 120; transform: translateY(calc(100% - 45px));
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .hud-wrapper.active { transform: translateY(0); }

        #hud-toggle {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            background: var(--accent); border: none; color: #000; 
            padding: 12px 25px; cursor: pointer; font-family: var(--font-mono); 
            font-size: 0.75rem; font-weight: bold; letter-spacing: 2px; 
            clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%);
        }

        .hud-main {
            background: var(--terminal-bg); border-top: 2px solid var(--accent);
            backdrop-filter: blur(25px); max-height: 70vh; overflow-y: auto;
        }

        .hud-content {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); width: 100%;
        }

        .hud-item {
            padding: 25px; border: 1px solid rgba(255,180,0,0.1);
            display: flex; flex-direction: column; 
        }

        .hud-label { font-size: 0.65rem; color: var(--accent); opacity: 0.8; margin-bottom: 8px; }
        .hud-value { font-size: 1rem; color: #fff; font-weight: 700; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .status-dot { 
            width: 8px; height: 8px; background: #00ff00; border-radius: 50%; 
            display: inline-block; margin-left: 8px; animation: pulse 2s infinite; 
        }

        @media (max-width: 768px) {
            .path-monitor { width: 150px; right: 15px; top: auto; bottom: 80px; }
            .hud-content { grid-template-columns: 1fr 1fr; }
            @media (max-width: 450px) {
                .path-monitor { width: 120px; }
            }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="viewport">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="img/Moon_Phases_Near_Far_Waning_720.mp4" type="video/mp4">
        </video>
        
        <div class="overlay-vignette"></div>

        <div class="mission-header">
            <div class="box">
                <h1>ARTEMIS II <span class="status-dot"></span></h1>
            </div>
            <div class="box">
                <span style="font-size: 0.6rem; letter-spacing: 2px;">S/C STATUS: <span style="color: #00ff00;">NOMINAL</span></span>
            </div>
        </div>

        <div class="path-monitor">
            <div class="monitor-label">
                <span>Trayectoria</span>
                <span id="rand-pct">88%</span>
            </div>
            <div class="video-container">
                <video autoplay muted loop playsinline>
                    <source src="img/path.mp4" type="video/mp4">
                </video>
            </div>
            <div class="monitor-coords">
                LOC: 28.5728° N, 80.6490° W<br>
                ALT: 384,400 KM
            </div>
        </div>
    </div>

    <div class="hud-wrapper" id="hud-wrap">
        <button id="hud-toggle" onclick="toggleHUD()">▲ TERMINAL_DATA</button>
        <footer class="hud-main">
            <div class="hud-content">
                <div class="hud-item">
                    <span class="hud-label">ORION_TELEMETRY</span>
                    <span class="hud-value" id="mission-clock">UTC 00:00:00</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">LUNAR_PARAMS</span>
                    <span class="hud-value">G: 1.62m/s²</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">NASA_APOD_SOURCE</span>
                    <span id="nasa-title" class="hud-value">CONNECTING...</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">ISS_LOCATION</span>
                    <span class="hud-value" id="iss-pos">LAT: -- / LON: --</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">S/C_LOG</span>
                    <span id="artemis-log" class="hud-value" style="color: #00ff00; font-size: 0.75rem;">SYSTEMS_READY</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function toggleHUD() {
            const wrap = document.getElementById('hud-wrap');
            const btn = document.getElementById('hud-toggle');
            const isActive = wrap.classList.toggle('active');
            btn.innerText = isActive ? "▼ CLOSE_TERMINAL" : "▲ TERMINAL_DATA";
        }

        async function getNasaData() {
            try {
                const res = await fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
                const data = await res.json();
                document.getElementById("nasa-title").innerText = data.title.toUpperCase().substring(0, 20);
            } catch (e) { document.getElementById("nasa-title").innerText = "OFFLINE"; }
        }

        async function getISS() {
            try {
                const res = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
                const data = await res.json();
                document.getElementById("iss-pos").innerText = `${data.latitude.toFixed(2)}°N ${data.longitude.toFixed(2)}°E`;
            } catch (err) { }
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById("mission-clock").innerText = "UTC " + now.toISOString().split('T')[1].split('.')[0];
            // Cambiar porcentaje random en el monitor para dar vida
            document.getElementById("rand-pct").innerText = Math.floor(Math.random() * (99 - 90) + 90) + "%";
        }, 1000);

        getNasaData();
        getISS();
        setInterval(getISS, 10000);
    </script>
</body>
</html>

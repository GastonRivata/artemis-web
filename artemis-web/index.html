<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis II - Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #ffb400; /* Naranja Ámbar NASA */
            --glow-color: rgba(255, 180, 0, 0.3);
            --warning-red: #ff3333;
            --panel-bg: rgba(5, 5, 5, 0.9);
            --terminal-font: 'Roboto Mono', monospace;
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- CAPAS DE REALISMO --- */
        .scanlines {
            position: fixed; inset: 0; z-index: 99; pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
        }

        .viewport {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-video {
            position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0;
        }

        .overlay-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 1; pointer-events: none;
        }

        /* --- BOTÓN DE INTERACCIÓN --- */
        #hud-toggle {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            font-family: var(--terminal-font);
            font-size: 0.7rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--glow-color);
        }
        #hud-toggle:hover {
            background: var(--accent-color);
            color: black;
        }

        /* --- MINIATURAS Y YOUTUBE --- */
        .secondary-video-container {
            position: absolute; bottom: 100px; left: 20px;
            width: 220px; aspect-ratio: 16/9;
            border-left: 3px solid var(--accent-color);
            z-index: 10; background: #000; transition: 0.5s;
        }
        
        .live-stream-container {
            position: absolute; top: 20px; right: 20px;
            width: 260px; height: 146px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
        }

        /* --- HUD (OCULTO POR DEFECTO) --- */
        .hud {
            position: fixed;
            bottom: -200px; /* Escondido */
            left: 0; width: 100%;
            background: var(--panel-bg);
            border-top: 1px solid var(--accent-color);
            padding: 20px 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            transition: bottom 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            font-family: var(--terminal-font);
        }

        .hud.active { bottom: 0; }

        .hud-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
        }

        .hud-item { border-right: 1px solid rgba(255,180,0,0.15); padding: 0 15px; }
        .hud-item:last-child { border: none; }

        .hud-title { font-size: 0.55rem; text-transform: uppercase; color: var(--accent-color); opacity: 0.7; margin-bottom: 5px; display: block; }
        .value { font-size: 1.1rem; color: white; display: block; }

        /* --- EFECTO GLITCH ANIMADO --- */
        @keyframes textGlitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 1px); }
            4% { transform: translate(2px, -1px); }
            6% { transform: translate(0); }
            100% { transform: translate(0); }
        }
        .glitch { animation: textGlitch 5s infinite; }

        .live-tag {
            color: var(--warning-red); font-size: 0.7rem; font-weight: bold;
            animation: blink 1.5s infinite; display: flex; align-items: center; gap: 6px;
        }
        @keyframes blink { 50% { opacity: 0.1; } }

        @media (max-width: 768px) {
            .hud-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            #artemis-brand { grid-column: span 2; margin-bottom: 10px; }
            .secondary-video-container { width: 100px; bottom: 120px; }
            .live-stream-container { width: 120px; height: 70px; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="viewport">
        <video autoplay muted loop playsinline class="main-video">
            <source src="img/Moon_Phases_Near_Far_Waning_720.mp4" type="video/mp4">
        </video>

        <div class="overlay-vignette"></div>

        <button id="hud-toggle" onclick="toggleHUD()">Initialize HUD</button>

        <div class="secondary-video-container" id="path-mini">
            <video autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover;">
                <source src="img/path.mp4" type="video/mp4">
            </video>
        </div>

        <div class="live-stream-container">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/WeIVJyufJrE?autoplay=1&mute=1&controls=0" frameborder="0"></iframe>
        </div>
    </div>

    <footer class="hud" id="main-hud">
        <div class="hud-grid">
            <div id="artemis-brand" class="hud-item">
                <h2 style="margin:0; color:var(--accent-color); font-size:1.1rem;" class="glitch">ORION_CONSOLE_v2.6</h2>
                <span style="font-size: 0.5rem; opacity: 0.6;">SYSTEM STATUS: NOMINAL</span>
            </div>

            <div class="hud-item">
                <span class="hud-title">Data Link</span>
                <span class="live-tag">CONNECTED</span>
            </div>

            <div class="hud-item">
                <span class="hud-title">Mission Timer</span>
                <span id="mission-time" class="value" style="color: var(--accent-color);">--:--:--</span>
            </div>

            <div class="hud-item">
                <span class="hud-title">ISS Telemetry</span>
                <span class="value" style="font-size:0.8rem">LAT: <span id="latitude">--</span></span>
                <span class="value" style="font-size:0.8rem">VEL: <span id="speed">--</span></span>
            </div>

            <div class="hud-item">
                <span class="hud-title">Est. Recovery</span>
                <span id="mission-countdown" class="value">--d --h</span>
            </div>
        </div>
    </footer>

    <script>
        // Función para mostrar/ocultar el HUD
        function toggleHUD() {
            const hud = document.getElementById('main-hud');
            const btn = document.getElementById('hud-toggle');
            const pathMini = document.getElementById('path-mini');
            
            hud.classList.toggle('active');
            
            if(hud.classList.contains('active')) {
                btn.innerText = "Hide Systems";
                btn.style.bottom = "180px"; // Sube el botón con el HUD
                pathMini.style.bottom = "200px";
            } else {
                btn.innerText = "Show Data";
                btn.style.bottom = "30px";
                pathMini.style.bottom = "100px";
            }
        }

        // Lógica de datos (igual que antes)
        const launchDate = new Date(2026, 3, 1, 19, 24, 0); 
        const endDate = new Date(launchDate.getTime() + (10 * 24 * 60 * 60 * 1000));

        async function getISSData() {
            try {
                const res = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
                const data = await res.json();
                document.getElementById("latitude").innerText = data.latitude.toFixed(2) + "°";
                document.getElementById("speed").innerText = Math.round(data.velocity).toLocaleString() + " km/h";
            } catch (err) { console.error("Signal Lost"); }
        }

        function updateTimers() {
            const now = new Date();
            let diff = Math.max(0, now - launchDate);
            const dE = Math.floor(diff / 86400000);
            const hE = Math.floor((diff % 86400000) / 3600000);
            const mE = Math.floor((diff % 3600000) / 60000);
            const sE = Math.floor((diff % 60000) / 1000);
            document.getElementById("mission-time").innerText = `${dE}d ${hE}h ${mE}m ${sE}s`;

            let left = endDate - now;
            document.getElementById("mission-countdown").innerText = left <= 0 ? "RE-ENTRY" : 
                `${Math.floor(left / 86400000)}d ${Math.floor((left % 86400000) / 3600000)}h`;
        }

        setInterval(getISSData, 5000);
        setInterval(updateTimers, 1000);
        getISSData(); updateTimers();
    </script>
</body>
</html>

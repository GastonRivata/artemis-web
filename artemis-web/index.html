<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Artemis II Live Mission Tracker - Consola de Navegación Orion</title>
    <meta name="description" content="Seguí la trayectoria de la cápsula Orion hacia la Luna con telemetría en vivo. Position, velocidad y estado orbital de la misión Artemis II en tiempo real.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://howfarartemis.com/">
    <meta property="og:title" content="Artemis II: Consola de Control de Misión en Vivo">
    <meta property="og:description" content="Explorá la telemetría orbital de la Orion Multi-Purpose Crew Vehicle. Datos en tiempo real de velocidad, trayectoria y estado de la misión Artemis II.">
    <meta property="og:image" content="howfarartemis.com/img/OrionArtemis.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png"> <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://howfarartemis.com/">
    <meta property="twitter:title" content="Artemis II Live Tracker: Misión Orion en Tiempo Real">
    <meta property="twitter:description" content="Telemetría orbital y posición de la misión Artemis II de la NASA en vivo.">
    <meta property="twitter:image" content="">

    <style>
        :root {
            --glow-color: rgba(0, 170, 255, 0.4);
            --accent-color: #00ffc3;
            --warning-red: #ff4444;
            --panel-bg: rgba(0, 10, 20, 0.9);
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .viewport {
            position: relative;
            flex: 1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0b0f1a, #000);
        }

        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 0; }
        .stars {
            position: absolute;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            width: 200%; height: 200%; top: -50%; left: -50%; opacity: 0.3;
        }
        .layer1 { animation: moveStars 150s linear infinite; }
        @keyframes moveStars { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            z-index: 1;
        }

        .planet { position: absolute; border-radius: 50%; background-size: cover; top: 50%; transform: translateY(-50%); }

        .earth {
            width: 160px; height: 160px;
            left: 15%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
            box-shadow: inset -15px -15px 40px rgba(0,0,0,0.9), 0 0 30px rgba(0,150,255,0.3);
            z-index: 10;
        }

        .moon {
            width: 50px; height: 50px;
            left: 85%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg");
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.1);
            z-index: 5;
        }

        .orbit {
            position: absolute;
            width: 70%; height: 35%;
            top: 50%; left: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            pointer-events: none;
        }

        .rocket {
            position: absolute;
            width: 30px; height: 60px;
            z-index: 20;
            transition: transform 0.2s linear;
        }
        .flame {
            position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 25px;
            background: radial-gradient(ellipse at top, #fff, #ff9800, transparent);
            filter: blur(2px); animation: burn 0.1s infinite alternate;
        }
        @keyframes burn { from { scale: 1; } to { scale: 1.3; } }

        .hud {
            height: auto;
            background: var(--panel-bg);
            border-top: 2px solid var(--glow-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .hud-grid {
            display: flex;
            width: 100%;
            max-width: 1100px;
            justify-content: space-around;
            align-items: stretch;
        }

        .hud-item {
            flex: 1;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 0 15px;
        }
        .hud-item:last-child { border-right: none; }

        .hud-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #88a; margin-bottom: 8px; display: block; }
        .value { font-size: 1.1rem; font-weight: bold; font-family: 'Courier New', monospace; }

        #artemis-brand {
            flex: 0.6;
            text-align: left;
            border-left: 3px solid var(--accent-color);
            padding-left: 20px;
            font-style: italic;
        }
        #artemis-brand h2 { margin: 0; color: var(--accent-color); font-size: 1.4rem; letter-spacing: 1px; }

        .live-tag {
            color: var(--warning-red);
            font-size: 0.7rem;
            font-weight: bold;
            animation: blink 1.5s infinite;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .live-tag::before { content: ""; width: 7px; height: 7px; background: var(--warning-red); border-radius: 50%; }
        @keyframes blink { 50% { opacity: 0.3; } }

        @media (max-width: 768px) {
            .hud { padding: 15px 10px; }
            .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            #artemis-brand { grid-column: span 2; border-left: none; border-bottom: 1px solid var(--accent-color); padding: 0 0 10px 0; text-align: center; }
            .hud-item { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
            .earth { width: 100px; height: 100px; }
            .moon { width: 35px; height: 35px; }
            .value { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="viewport">
        <div class="stars-container"><div class="stars layer1"></div></div>
        <div class="scene">
            <div class="earth planet"></div>
            <div class="moon planet"></div>
            <div class="orbit"></div>
            <div id="rocket" class="rocket">
                <svg viewBox="0 0 40 100">
                    <path d="M20 5 L35 80 L20 70 L5 80 Z" fill="#eee" />
                    <circle cx="20" cy="40" r="4" fill="#4fc3f7" />
                </svg>
                <div class="flame"></div>
            </div>
        </div>
    </div>

    <footer class="hud">
        <div class="hud-grid">
            <div id="artemis-brand">
                <h2>ARTEMIS II</h2>
                <span style="font-size: 0.6rem; color: #fff; opacity: 0.5;">ORION MULTI-PURPOSE CREW VEHICLE</span>
            </div>

            <div class="hud-item">
                <span class="hud-title">Status</span>
                <span class="live-tag">LIVE ISS DATA</span>
            </div>

            <div class="hud-item">
                <span class="hud-title">Tiempo Misión</span>
                <span id="mission-time" class="value" style="color: var(--accent-color);">00d 00h 00m</span>
            </div>

            <div class="hud-item">
                <span class="hud-title">Telemetría</span>
                <div style="display: flex; flex-direction: column; font-size: 0.8rem;">
                    <span>LAT: <span id="latitude" style="color:#fff">--°</span></span>
                    <span>VEL: <span id="speed" style="color:var(--accent-color)">-- km/h</span></span>
                </div>
            </div>

            <div class="hud-item">
                <span class="hud-title">Retorno Estimado</span>
                <span id="mission-countdown" class="value">--d --h --m</span>
            </div>
        </div>
    </footer>

    <script>
        const launchDate = new Date(2026, 3, 1, 19, 24, 0); 
        const endDate = new Date(launchDate.getTime() + (10 * 24 * 60 * 60 * 1000));
        let progress = 0;

        async function getISSData() {
            try {
                const res = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
                const data = await res.json();
                document.getElementById("latitude").innerText = data.latitude.toFixed(2) + "°";
                document.getElementById("speed").innerText = Math.round(data.velocity).toLocaleString() + " km/h";
                progress = (data.longitude + 180) / 360; 
            } catch (err) { console.error(err); }
        }

        function updateTimers() {
            const now = new Date();
            let diff = Math.max(0, now - launchDate);
            const dE = Math.floor(diff / 86400000);
            const hE = Math.floor((diff % 86400000) / 3600000);
            const mE = Math.floor((diff % 3600000) / 60000);
            const sE = Math.floor((diff % 60000) / 1000);
            document.getElementById("mission-time").innerText = `${dE}d ${hE}h ${mE}m ${sE}s`;

            let left = endDate - now;
            if (left <= 0) {
                document.getElementById("mission-countdown").innerText = "RE-ENTRY";
            } else {
                const dR = Math.floor(left / 86400000);
                const hR = Math.floor((left % 86400000) / 3600000);
                const mR = Math.floor((left % 3600000) / 60000);
                document.getElementById("mission-countdown").innerText = `${dR}d ${hR}h ${mR}m`;
            }
        }

        function animate() {
            const rocket = document.getElementById("rocket");
            const viewport = document.querySelector('.viewport');
            if(!viewport) return;
            const w = viewport.clientWidth;
            const h = viewport.clientHeight;

            const startX = w * 0.15;
            const endX = w * 0.85;
            const centerX = (startX + endX) / 2;
            const centerY = h * 0.5;
            const rx = (endX - startX) / 2;
            const ry = h * 0.18;

            const angle = Math.PI * (1 - progress); 
            const x = centerX + rx * Math.cos(angle);
            const y = centerY + ry * Math.sin(angle);
            
            const dx = -rx * Math.sin(angle);
            const dy = ry * Math.cos(angle);
            const rotation = Math.atan2(dy, dx);

            rocket.style.left = `${x}px`;
            rocket.style.top = `${y}px`;
            rocket.style.transform = `translate(-50%, -50%) scale(${0.7 + (progress * 0.3)}) rotate(${rotation + Math.PI/2}rad)`;
            
            requestAnimationFrame(animate);
        }

        setInterval(getISSData, 5000);
        setInterval(updateTimers, 1000);
        getISSData(); updateTimers(); animate();
    </script>
</body>
</html>
